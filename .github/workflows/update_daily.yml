name: Daily data update

on:
  schedule:
    - cron: "0 8 * * *"   # every day at 08:00 UTC
  workflow_dispatch:        # manual trigger

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas requests yfinance feedparser

      - name: Ingest Gazette notices
        run: python ingest/gazette_notices.py

      - name: Ingest case law feed
        run: python ingest/caselaw_feed.py

      - name: Ingest MANO share price
        run: python ingest/mano_price.py

      - name: Commit and push updated tracker.db
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tracker.db
          if git diff --staged --quiet; then
            echo "No changes to tracker.db — skipping commit."
          else
            git commit -m "data: daily update $(date -u '+%Y-%m-%d')"
            git push
          fi
