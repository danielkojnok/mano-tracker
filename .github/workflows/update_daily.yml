name: Daily data update

on:
  schedule:
    - cron: "0 8 * * *"   # every day at 08:00 UTC
  workflow_dispatch:        # manual trigger

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas requests yfinance feedparser

      - name: Ingest Gazette notices
        run: python ingest/gazette_notices.py

      - name: Ingest case law feed
        run: python ingest/caselaw_feed.py

      - name: Ingest MANO share price
        run: python ingest/mano_price.py

      - name: Verify DB was built
        run: |
          python - <<'EOF'
          import sqlite3
          conn = sqlite3.connect("data/tracker.db")
          for tbl in ["mano_price", "gazette_notices", "judgments"]:
              n = conn.execute(f"SELECT COUNT(*) FROM {tbl}").fetchone()[0]
              print(f"  {tbl}: {n:,} rows")
          conn.close()
          EOF
