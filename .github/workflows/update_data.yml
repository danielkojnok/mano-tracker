name: Monthly data update

on:
  schedule:
    - cron: "0 7 1 * *"   # 1st of every month at 07:00 UTC
  workflow_dispatch:        # manual trigger

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      COMPANIES_HOUSE_API_KEY: ${{ secrets.COMPANIES_HOUSE_API_KEY }}

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas requests yfinance feedparser python-dotenv openpyxl beautifulsoup4

      - name: Ingest insolvency stats
        run: python ingest/insolvency_stats.py

      - name: Ingest record-level data
        run: python ingest/record_level.py

      - name: Seed historical KPIs
        run: python ingest/seed_kpis.py

      - name: Enrich with Companies House profiles
        run: python ingest/companies_house.py

      - name: Ingest Gazette notices
        run: python ingest/gazette_notices.py

      - name: Ingest BoE Bank Rate
        run: python ingest/boe_bank_rate.py

      - name: Ingest ONS Business Demography
        run: python ingest/ons_business_demography.py

      - name: Verify DB was built
        run: |
          python - <<'EOF'
          import sqlite3
          conn = sqlite3.connect("data/tracker.db")
          for tbl in ["insolvencies_monthly", "insolvencies_record_level",
                      "mano_kpis", "companies_house_profiles", "gazette_notices",
                      "boe_bank_rate", "ons_demography_annual", "ons_demography_quarterly"]:
              n = conn.execute(f"SELECT COUNT(*) FROM {tbl}").fetchone()[0]
              print(f"  {tbl}: {n:,} rows")
          conn.close()
          EOF
