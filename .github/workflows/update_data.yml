name: Monthly data update

on:
  schedule:
    - cron: "0 7 1 * *"   # 1st of every month at 07:00 UTC
  workflow_dispatch:        # manual trigger

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      COMPANIES_HOUSE_API_KEY: ${{ secrets.COMPANIES_HOUSE_API_KEY }}

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas requests yfinance feedparser python-dotenv

      - name: Ingest insolvency stats
        run: python ingest/insolvency_stats.py

      - name: Ingest record-level data
        run: python ingest/record_level.py

      - name: Seed historical KPIs
        run: python ingest/seed_kpis.py

      - name: Enrich with Companies House profiles
        run: python ingest/companies_house.py

      - name: Ingest Gazette notices
        run: python ingest/gazette_notices.py

      - name: Commit and push updated tracker.db
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/tracker.db
          if git diff --staged --quiet; then
            echo "No changes to tracker.db — skipping commit."
          else
            git commit -m "data: auto-update $(date -u '+%Y-%m-%d')"
            git push
          fi
